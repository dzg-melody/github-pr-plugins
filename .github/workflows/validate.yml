name: validate
on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install validator deps
        run: npm install --no-save ajv@^8 ajv-formats@^3 gray-matter@^4
      - name: Validate plugin manifests & marketplaces
        run: node scripts/validate.mjs
